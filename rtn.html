<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RTBS TV - Election 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=0">
  <link rel="stylesheet" href="css/reflecttn.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&display=swap');

    @font-face {
        font-family: 'Tamil039';
        src: url('https://www.rtbs.in/font/Tamil039.woff2') format('woff2'),
             url('https://www.rtbs.in/font/Tamil039.woff') format('woff');
        font-weight: bold;
        font-style: normal;
        font-display: swap;
    }

    /* Logo & Wavy Text */
    .logo { float: right; display: flex; }
    .waviy { background: #c60203; width: 257px; height: 50px; position: relative; padding: 0px 0px 0px 7px; }
    .waviy span { position: relative; display: inline-block; font-family: Tahoma, Verdana, sans-serif; font-size: 40px; font-weight: 900; color: #fff; letter-spacing: -5px; text-shadow: -1px -1px 1px #fff, 1px 1px 1px #000; -webkit-text-stroke: 1.5px #c9a050; text-transform: none; animation: flip 2s infinite; animation-delay: calc(.1s * var(--i)); }
    .live { background: #19f radial-gradient(transparent, #02c); position: relative; padding: 0px 4px 2px 10px; display: inline-block; font-family: Tahoma, Verdana, sans-serif; font-size: 40px; font-weight: 900; color: #2a366a; text-shadow: -1px -1px 1px #fff, 1px 1px 1px #000; -webkit-text-stroke: 1px red; text-transform: none; animation: flip 2s infinite; animation-delay: calc(.1s * var(--i)); }
    @keyframes flip { 0%, 80% { transform: rotateY(360deg); } }

    /* Breaking News Top */
    #breakingnews { text-align: center; background: linear-gradient(90deg,#0000 33%,rgba(255,255,255,0.3) 50%,#0000 66%) #c60203; border-radius: 15px; border: 2px solid #fff000; width: 982px; height: 50px; overflow: hidden; }
    #adbreakingnews { float: none; margin-right: 0px; margin-top: 3px; }
    #adbreakingnews ul, #adbreakingnews li { list-style: none; margin: 0; padding: 0px; }
    #adbreakingnews li a { font-family: 'Tamil039' !important; font-weight: bold; font-style: normal; font-size: 26px; text-align: justify; justify-content: center; color: #fff; word-spacing: -5px; padding: 0 0px; font-weight: 900; transition: all 0.5s ease-in-out; text-decoration: none; text-shadow: -1px -1px 1px #000, 1px 1px 1px #fff; animation: blink 1.5s linear infinite alternate 1.5s; }
    @keyframes blink { 80% { color: white; } 90% { color: red; } 100% { color: white; } }

    /* News Ticker Location */
    .ticker-wrap { width: 200px; display: block; border-radius: 21px; text-align: center; margin: 0 0px 0px 0px; padding: 5px; }
    #ticker { height: 45px; overflow: hidden; text-align: left; }
    #ticker ul { padding: 0; margin: 0; list-style: none; }
    #ticker ul li { height: 32px; white-space: nowrap; }
    #ticker ul li img { background: transparent; float: left; width: 25px; height: 25px; margin: 5px 3px 0px 0px; }
    #ticker ul li h3 { margin: 0; font: 700 16px 'roboto', sans-serif; margin: 3px 3px -15px 0px; }
    #ticker ul li h3 a { color: #fff; text-decoration: none; padding: 0px 5px 0px 5px; }
    #ticker ul li .tickermeta { font: 700 18px 'roboto', sans-serif; line-height: 25px !important; color: #fff; display: none; }

    /* S3 Slider */
    #slider, #sliderContent, #slider img { width: 960px; height: 100px; position: absolute; }
    #sliderContent { bottom: 110px; left: 305px; margin: 0 0; padding: 0 0; overflow: hidden; }
    #slider img { border: none; padding: 10px 0; margin: 0 0; height: auto; outline: none; display: none; }
    .sliderImage { list-style: none; margin: 0 0; padding: 0 0; display: none; }
    .sliderImage span { background-color: #c60203; border-radius: 20px; opacity: .9; filter: alpha(opacity=90); left: 0; right: 0; bottom: 0; text-align: center; color: white; padding: 12px 10px 2px; display: none; overflow: hidden; }
    .sliderImage span a { font-size: 24px; color: white; text-decoration: none; font-family: 'Tamil039' !important; font-weight: bold; font-style: normal; word-spacing: -5px; text-align: center; line-height: 1.8; text-shadow: -1px -1px 1px #fff, 1px 1px 1px #000; overflow: hidden; }

    /* Bottom Scrolling Ticker */
    .breaking-scroll, .breaking-scroll a:link { text-decoration: none; height: 47px; color: #FFF; font-family: 'Tamil039' !important; font-weight: bold; font-style: normal; font-size: 26px; text-shadow: -1px -1px 1px #fff, 1px 1px 1px #000; word-spacing: -5px; margin-top: 2px; }
  </style>
</head>
<body>

  <div class="page-loader">
    <div class="txt">
      <img src="https://host.rtbs.in/media/isat-glob.gif" alt="Loader"><br>Connection Establishing...
    </div>
  </div>

  <div class='rtcs-bg'></div>

  <div class='rtcs'>
    <div class='main'>
      
      <div class='top-wrap'>
        <div class='logo'>
          <div class="waviy">
             <span style="--i:1">R</span><span style="--i:2">e</span><span style="--i:3">f</span><span style="--i:4">l</span><span style="--i:5">e</span><span style="--i:6">c</span><span style="letter-spacing: 0.1px;--i:5">t</span>
             <div class="live"> <span style="color:#fff000;-webkit-text-stroke: 1px #fff000;letter-spacing: 4px;">T</span><span style="letter-spacing: 4px;">N</span></div>
          </div>
        </div>

        <div class='ticker-top'>
          <div class='textrss'>
            <div id='breakingnews'>
              <span class='breakhead'>
                <div id='adbreakingnews'></div>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="rtcs-stream">
        
        <iframe class="rtcs-ad" width="320px" height="670px" src="https://www.rtbs.in/image-slider/slide670" allow="autoplay" scrolling="no" frameborder="0"></iframe>

        <iframe class="rtcs-stream" width="100vh" height="605px" src="https://com.rtbs.in/?scene&room=ReflectTN&scenetype=2&order=N&916&cover&exclude=Anchor&controls=0&cc&cv&transparency&animate&margin=2&sl&fontsize=140&css=https://host.rtbs.in/rtcs/label-mt-debate.css" allow="autoplay" scrolling="no" frameborder="0"></iframe>
      </div>
      
      <div class="watermark">
        <marquee width="100%" direction="right"><h1>Developed By - www.rtbs.in</h1></marquee>
      </div>

      <div class="location">
        <div id="content">
          <div class='ticker-wrap'>
            <div id='ticker'></div>
          </div>
        </div>
      </div>
      
      <div class='cur-event'></div>

      <div class="textslider">
        <script>
          // Slider Configuration
          var slideOpenNewTab = false;
          var idMode          = true;
          var slidebyLabels   = true;
          var slideLabelName  = "sliding";
          var thumbWidth      = 420;
          var pBlank          = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg1DBQz7KbG9ycllCVxo8gAW5jB2qzUFZp-bIXc8t55QxC70eugjthx2OjzDxyEYLp0ObVlWGITcypy7oIUyO7y1AMCAu5RlUei6a6V7HWoW5Vl-PzPUYBNRrq7cXMbafC4bsWCz0JO6fRCzejdKC1EynC5MsaCQLTewDJ3r1cMVAp95eeD2L8f3kKzZu4/s500/20241120_144504.png";
          var numposts_g      = 4;
          var home_page       = "https://reflecttn.blogspot.com";
          
          function s3SliderGallery(json) {
            document.write('<div id="slider"><ul id="sliderContent">');
            for (var i = 0; i < numposts_g; i++) {
              var entry = json.feed.entry[i], title = entry.title.$t, link, img = pBlank;
              if (i == entry.length) break;
              for (var j = 0, jen = entry.link.length; j < jen; j++) {
                if (entry.link[j].rel == 'alternate') { link = entry.link[j].href; break; }
              }
              try { img = entry.media$thumbnail.url; } catch (e) {}
              document.write('<li class="sliderImage"><a href="' + link + '"' + (slideOpenNewTab ? ' target="_blank"' : '') + '><img src="' + img + '" alt="' + title + '" class="recent-thumb"></a><span><a href="' + link + '"' + (slideOpenNewTab ? ' target="_blank"' : '') + ' class="recent-link">' + title + '</a></span></li>');
            }
            document.write('</ul></div>');
          }
        </script>
        <script src="https://reflecttn.blogspot.com/feeds/posts/default/-/sliding?max-results=4&orderby=published&alt=json-in-script&callback=s3SliderGallery"></script>
      </div>

      <div class='ticker'>
        <nav class="breaking-scroll" id="breaking-scroll" role="breaking-scroll">
          <script type="text/javascript">
            var nMaxPosts = 10;
            var nWidth = 100;
            var nScrollDelay = 0;
            var sDirection = "left";
            var sOpenLinkLocation = "N";
            var sBulletChar = "&#x2727;";

            function RecentPostsScrollerv2(json) {
              var sHeadLines = "", sPostURL, sMoqueeHTMLStart, sMoqueeHTMLEnd, sHeadlineTerminator, sPostLinkLocation;
              try {
                sMoqueeHTMLStart = "<MARQUEE behavior=\"scroll\" onmouseover=\"this.stop();\" onmouseout=\"this.start();\" width=\"" + (nWidth ? nWidth + "%" : "100%") + "\"";
                if (nScrollDelay) sMoqueeHTMLStart += " scrolldelay=\"" + nScrollDelay + "\"";
                if (sDirection) {
                  sMoqueeHTMLStart += " direction=\"" + sDirection + "\">";
                  sHeadlineTerminator = (sDirection == "left" || sDirection == "right") ? "&nbsp;&nbsp;" : "<br/>";
                }
                sPostLinkLocation = (sOpenLinkLocation == "N") ? " target=\"_blank\" " : " ";
                sMoqueeHTMLEnd = "</MARQUEE>";

                for (var nFeedCounter = 0; nFeedCounter < nMaxPosts; nFeedCounter++) {
                  var objPost = json.feed.entry[nFeedCounter];
                  if (nFeedCounter == json.feed.entry.length) break;
                  for (var nCounter = 0; nCounter < objPost.link.length; nCounter++) {
                    if (objPost.link[nCounter].rel == 'alternate') { sPostURL = objPost.link[nCounter].href; break; }
                  }
                  sHeadLines += "<b>" + sBulletChar + "</b> <a " + sPostLinkLocation + " href=\"" + sPostURL + "\">" + objPost.title.$t + "</a>" + sHeadlineTerminator;
                }
                document.write(sMoqueeHTMLStart + sHeadLines + sMoqueeHTMLEnd);
              } catch (exception) { console.log(exception); }
            }
          </script>
          <script src="https://reflecttn.blogspot.com/feeds/posts/default/-/scrolling?alt=json-in-script&callback=RecentPostsScrollerv2&max-results=50"></script>
        </nav>
      </div>
      
      <div class='stock-info'>
        <div class="breaking_news">
          <div class="label ripple">Breaking News</div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.2/jquery.min.js"></script> <script src="https://apis.google.com/js/plusone.js" async></script>
  <script src="https://host.rtbs.in/rtcs/horizontal-panel-marquee.js"></script>

  <script>
    // 1. Loader FadeOut
    $(window).on('load', function() {
        setTimeout(function(){ 
            $('.page-loader').fadeOut('slow'); 
        }, 3500);
    });

    // 2. Breaking News Top (Ajax JSON)
    $(document).ready(function(){
        var e="https://reflecttn.blogspot.com", t=1;
        $.ajax({
            url: e+"/feeds/posts/default/-/slidingtop?alt=json-in-script&max-results="+t,
            type: "get",
            dataType: "jsonp",
            success: function(data){
                function slideNews(){
                    $("#adbreakingnews li:first").slideUp(function(){
                        $(this).appendTo($("#adbreakingnews ul")).slideDown();
                    });
                }
                var n, r, s="", a=data.feed.entry;
                if(a !== undefined){
                    s="<ul>";
                    for(var l=0; l<a.length; l++){
                        for(var o=0; o<a[l].link.length; o++){
                            if(a[l].link[o].rel == "alternate"){ n=a[l].link[o].href; break; }
                        }
                        r=a[l].title.$t;
                        s+='<li><a href="'+n+'" target="_blank">'+r+"</a></li>";
                    }
                    s+="</ul>";
                    $("#adbreakingnews").html(s);
                    setInterval(slideNews, 5000);
                } else {
                    $("#adbreakingnews").html("<span>No result!</span>");
                }
            },
            error: function(){ $("#adbreakingnews").html("<strong>Loading error!</strong>"); }
        });
    });

    // 3. Location Ticker (vTicker Core Logic)
    function getauthor(t) { for (var e = 0; e < t.length; e++) return t[e].name.$t; }
    function getmeta(t) { var e = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"], i = t.substring(0, 4), a = t.substring(5, 7), n = t.substring(8, 10); return e[parseInt(a, 10)] + " " + n + " " + i; }
    
    function RTCSliveTicker(t) {
        var e = document.querySelector("#ticker"), i = t.feed.entry, a = "<ul id='ticket-wrapper-inner'>";
        if (i) {
            for (var n = 0; n < i.length; n++) {
                var r = i[n], s = 0, l = "", o = "";
                for (; s < r.link.length; s++) if ("alternate" == r.link[s].rel) { l = r.link[s].href; break; }
                try { o = '<img src="' + r.media$thumbnail.url + '"/>'; } catch (err) {}
                var u = r.title.$t, d = getmeta(r.published.$t);
                a += "<li>" + o + '<h3><a href="' + l + '">' + u + '</a></h3><div class="tickermeta"><span>' + d + "</span></div></li>";
            }
            a += "</ul>";
            e.innerHTML = a;
        }
        $("#ticker").vTicker();
    }

    // jQuery vTicker Plugin Init

    // 4. S3 Slider Logic
    $(window).bind('load', function() { $('#slider').s3Slider({ timeOut: 5000 }); });
    (function($){$.fn.s3Slider=function(vars){var element=this;var timeOut=(vars.timeOut!=undefined)?vars.timeOut:10000;var current=null;var timeOutFn=null;var faderStat=true;var mOver=false;var items=$("#"+element[0].id+"Content ."+element[0].id+"Image");var itemsSpan=$("#"+element[0].id+"Content ."+element[0].id+"Image span");items.each(function(i){$(items[i]).mouseover(function(){mOver=true;});$(items[i]).mouseout(function(){mOver=false;fadeElement(true);});});var fadeElement=function(isMouseOut){var thisTimeOut=(isMouseOut)?(timeOut/2):timeOut;thisTimeOut=(faderStat)?10:thisTimeOut;if(items.length>0){timeOutFn=setTimeout(makeSlider,thisTimeOut);}else{console.log("Poof..");}}

    makeSlider();};})(jQuery);

    // 5. Horizontal Panel Marquee
    $(window).load( function() {
        $('#panel').hpanel({ duration: 80000 });
    });
  </script>
  
  <script src="https://reflecttn.blogspot.com/feeds/posts/default/-/location?alt=json&callback=RTCSliveTicker"></script>
</body>
